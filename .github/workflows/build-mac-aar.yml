name: Release macOS aar App

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build jar
        run: ./gradlew clean shadowJar

      - name: Read app name
        run: |
          APP_NAME=$(python3 - <<'PY'
          import configparser
          import re

          path = "src/main/resources/settings.properties"

          with open(path, "r", encoding="utf-8") as f:
              text = f.read()

          match = re.search(r"^app\.name=(.*)$", text, re.MULTILINE)
          if not match:
              raise SystemExit("app.name not found")

          value = match.group(1).strip()
          value = value.encode("utf-8").decode("unicode_escape")

          print(value)
          PY
          )

          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
          echo "APP_NAME=$APP_NAME"  

      - name: Read Gradle version
        run: |
          VERSION=$(./gradlew -q properties | grep "^version:" | awk '{print $2}')
          APP_VERSION=$(echo "$VERSION" | sed 's/-SNAPSHOT//' | sed 's/^0\./1./')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV

      - name: Download JavaFX JMODS
        run: |
          curl -L -o javafx-jmods.zip https://download2.gluonhq.com/openjfx/21.0.2/javafx-jmods-21.0.2_osx-aarch64_bin-jmods.zip
          unzip javafx-jmods.zip -d javafx-jmods
      - name: Create runtime image
        run: |
          jlink \
            --module-path "$JAVA_HOME/jmods:javafx-jmods/javafx-jmods-21.0.2" \
            --add-modules java.base,java.desktop,java.sql,java.naming,javafx.controls,javafx.fxml,javafx.graphics \
            --output runtime \
            --strip-debug \
            --no-header-files \
            --no-man-pages

      - name: Package dmg
        run: |
          jpackage \
            --type dmg \
            --name "${{ env.APP_NAME }}" \
            --app-version ${{ env.APP_VERSION }} \
            --input build/libs \
            --main-jar templeapp.jar \
            --main-class tw.org.il.dongsheng.templeapp.TempleApplication \
            --runtime-image runtime \
            --java-options "-Dfile.encoding=UTF-8" \
            --icon packaging/icon.icns \
            --dest dist

      - name: Rename dmg
        run: |
          mv dist/*.dmg dist/TempleApp-macOS-x64-${{ env.VERSION }}.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: TempleApp v${{ env.VERSION }}
          files: dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}