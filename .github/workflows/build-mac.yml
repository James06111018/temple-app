name: Release macOS App

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build jar
        run: ./gradlew clean shadowJar

      - name: Read app name
        run: |
          APP_NAME=$(grep "^app.name=" src/main/resources/settings.properties | cut -d'=' -f2)
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV  

      - name: Read Gradle version
        run: |
          VERSION=$(./gradlew -q properties | grep "^version:" | awk '{print $2}')
          APP_VERSION=$(echo "$VERSION" | sed 's/-SNAPSHOT//' | sed 's/^0\./1./')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV

      - name: Download JavaFX
        run: |
          curl -L -o javafx.zip https://download2.gluonhq.com/openjfx/21.0.2/openjfx-21.0.2_osx-x64_bin-sdk.zip
          unzip javafx.zip -d javafx

      - name: Package dmg
        run: |
          jpackage \
            --type dmg \
            --name ${{ env.APP_NAME }} \
            --app-version ${{ env.APP_VERSION }} \
            --input build/libs \
            --main-jar templeapp.jar \
            --main-class tw.org.il.dongsheng.templeapp.TempleApplication \
            --module-path javafx/javafx-sdk-21.0.2/lib \
            --add-modules javafx.controls,javafx.fxml,javafx.graphics \
            --java-options "-Dfile.encoding=UTF-8" \
            --icon packaging/icon.icns \
            --dest dist

      - name: Rename dmg
        run: |
          mv dist/*.dmg dist/TempleApp-macOS-x64-${{ env.VERSION }}.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: TempleApp v${{ env.VERSION }}
          files: dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}