name: Release Windows EXE

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build jar
        run: .\gradlew.bat clean shadowJar

      - name: Download JavaFX JMODS
        shell: powershell
        run: |
          $version = "21.0.2"
          $base = "https://repo1.maven.org/maven2/org/openjfx"

          New-Item -ItemType Directory -Force javafx-jmods | Out-Null

          Invoke-WebRequest "$base/javafx-base/$version/javafx-base-$version-win.jar" -OutFile "javafx-jmods/javafx-base.jar"
          Invoke-WebRequest "$base/javafx-graphics/$version/javafx-graphics-$version-win.jar" -OutFile "javafx-jmods/javafx-graphics.jar"
          Invoke-WebRequest "$base/javafx-controls/$version/javafx-controls-$version-win.jar" -OutFile "javafx-jmods/javafx-controls.jar"
          Invoke-WebRequest "$base/javafx-fxml/$version/javafx-fxml-$version-win.jar" -OutFile "javafx-jmods/javafx-fxml.jar"

      - name: Create runtime image
        shell: cmd
        run: |
          jlink ^
            --module-path "%JAVA_HOME%\jmods;javafx-jmods" ^
            --add-modules java.base,java.desktop,java.sql,java.naming,javafx.controls,javafx.fxml,javafx.graphics ^
            --output runtime ^
            --strip-debug ^
            --no-header-files ^
            --no-man-pages

      - name: Install WiX
        shell: powershell
        run: |
          dotnet tool install --global wix --version 4.0.5

      - name: Read app name
        shell: powershell
        run: |
          $line = Select-String -Path "src/main/resources/settings.properties" -Pattern "^\s*app\.name\s*=" | Select-Object -First 1
          $appName = ($line.Line -split "=", 2)[1].Trim()
          "APP_NAME=$appName" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "APP_NAME=$appName"

      - name: Read Gradle version
        shell: powershell
        run: |
          $version = .\gradlew.bat -q properties | Select-String "^version:" | ForEach-Object { ($_ -split "\s+")[1] }
          $appVersion = $version -replace "-SNAPSHOT",""
          $appVersion = $appVersion -replace "^0\.","1."
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "APP_VERSION=$appVersion" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Package EXE
        shell: cmd
        run: |
          jpackage ^
            --type exe ^
            --name TempleApp ^
            --app-version "%APP_VERSION%" ^
            --input build\libs ^
            --main-jar templeapp.jar ^
            --main-class tw.org.il.dongsheng.templeapp.TempleApplication ^
            --runtime-image runtime ^
            --java-options "-Dfile.encoding=UTF-8" ^
            --icon packaging\icon.ico ^
            --dest dist ^
            --win-menu ^
            --win-menu-group "宮廟點燈系統" ^
            --win-shortcut

      - name: Rename exe
        shell: powershell
        run: |
          $exe = Get-ChildItem dist -Filter *.exe | Select-Object -First 1
          Rename-Item $exe.FullName "TempleApp-Windows-$env:VERSION.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: TempleApp v${{ env.VERSION }}
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}