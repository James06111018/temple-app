name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build jar
        run: .\gradlew.bat clean shadowJar

      - name: Download JavaFX JMODS
        shell: powershell
        run: |
          $version = "21.0.2"
          $base = "https://repo1.maven.org/maven2/org/openjfx"

          New-Item -ItemType Directory -Force javafx-jmods | Out-Null

          Invoke-WebRequest "$base/javafx-base/$version/javafx-base-$version-win.jar" -OutFile "javafx-jmods/javafx-base.jar"
          Invoke-WebRequest "$base/javafx-graphics/$version/javafx-graphics-$version-win.jar" -OutFile "javafx-jmods/javafx-graphics.jar"
          Invoke-WebRequest "$base/javafx-controls/$version/javafx-controls-$version-win.jar" -OutFile "javafx-jmods/javafx-controls.jar"
          Invoke-WebRequest "$base/javafx-fxml/$version/javafx-fxml-$version-win.jar" -OutFile "javafx-jmods/javafx-fxml.jar"

      - name: Create runtime image
        shell: cmd
        run: |
          jlink ^
            --module-path "%JAVA_HOME%\jmods;javafx-jmods" ^
            --add-modules java.base,java.desktop,java.sql,java.naming,javafx.controls,javafx.fxml,javafx.graphics ^
            --output runtime ^
            --strip-debug ^
            --no-header-files ^
            --no-man-pages

      - name: Check JavaFX native dlls
        shell: powershell
        run: |
          Get-ChildItem runtime\bin | Where-Object { $_.Name -match "prism|glass|javafx" } 

      - name: Install WiX
        shell: powershell
        run: |
          dotnet tool install --global wix --version 4.0.5

      - name: Read Gradle version
        shell: powershell
        run: |
            $version = .\gradlew.bat -q properties | Select-String "^version:" | ForEach-Object { ($_ -split "\s+")[1] }
            "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Package EXE
        shell: cmd
        run: |
          jpackage ^
            --type exe ^
            --name TempleApp ^
            --app-version %VERSION% ^
            --input build\libs ^
            --main-jar templeapp.jar ^
            --main-class tw.org.il.dongsheng.templeapp.TempleApplication ^
            --runtime-image runtime ^
            --java-options "-Dfile.encoding=UTF-8" ^
            --dest dist ^
            --win-menu ^
            --win-shortcut   

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: TempleApp-Windows
          path: dist
