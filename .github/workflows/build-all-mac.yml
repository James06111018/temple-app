  release-mac:
    strategy:
      matrix:
        include:
          - runner: macos-13
            arch: x64
            javafx_arch: x64
          - runner: macos-latest
            arch: arm64
            javafx_arch: aarch64

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Build jar
        run: ./gradlew clean shadowJar

      - name: Read app name
        run: |
          APP_NAME=$(python3 - <<'PY'
          import re

          path = "src/main/resources/settings.properties"

          with open(path, "r", encoding="utf-8") as f:
              text = f.read()

          match = re.search(r"^app\.name=(.*)$", text, re.MULTILINE)
          if not match:
              raise SystemExit("app.name not found")

          value = match.group(1).strip()
          value = value.encode("utf-8").decode("unicode_escape")
          print(value)
          PY
          )

          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
          echo "APP_NAME=$APP_NAME"

      - name: Read version
        run: |
          VERSION=$(./gradlew -q properties | grep "^version:" | awk '{print $2}')
          APP_VERSION=$(echo "$VERSION" | sed 's/-SNAPSHOT//' | sed 's/^0\./1./')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV

      - name: Download JavaFX
        run: |
          curl -L -o javafx.zip https://download2.gluonhq.com/openjfx/${{ env.JAVAFX_VERSION }}/openjfx-${{ env.JAVAFX_VERSION }}_osx-${{ matrix.javafx_arch }}_bin-sdk.zip
          unzip javafx.zip -d javafx

      - name: Package macOS dmg
        run: |
          jpackage \
            --type dmg \
            --name "${{ env.APP_NAME }}" \
            --app-version ${{ env.APP_VERSION }} \
            --input build/libs \
            --main-jar ${{ env.MAIN_JAR }} \
            --main-class ${{ env.MAIN_CLASS }} \
            --module-path javafx/javafx-sdk-${{ env.JAVAFX_VERSION }}/lib \
            --add-modules javafx.controls,javafx.fxml,javafx.graphics \
            --java-options "-Dfile.encoding=UTF-8" \
            --icon packaging/icon.icns \
            --dest dist

      - name: Rename dmg
        run: |
          mv dist/*.dmg dist/TempleApp-macOS-${{ matrix.arch }}-${{ env.VERSION }}.dmg

      - name: Upload macOS to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: TempleApp v${{ env.VERSION }}
          files: dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}